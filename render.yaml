services:
  - type: web
    name: chatbot-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: huggingface
      - key: HF_API_TOKEN
        sync: false
      - key: HF_MODEL
        value: google/flan-t5-base
